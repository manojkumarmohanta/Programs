<div class="container my-4">
    <div class="col-md-6 offset-md-3 offset-md-3">
        <h3 class="text-center">Update Employee</h3>
        <form class="form" (ngSubmit) = "onSubmit()">
            <div class="form-group">
                <label class="form-label">First Name:</label>
                <input 
                    type = "text"
                    class = "form-control"
                    id = "firstName"
                    [(ngModel)] = "employee.firstName"
                    name="firstName"
                >
            </div>
            <div class="form-group">
                <label class="form-label">Last Name:</label>
                <input 
                    type = "text"
                    class = "form-control"
                    id = "lastName"
                    [(ngModel)] = "employee.lastName"
                    name="lastName"
                >
            </div>
            <div class="form-group">
                <label class="form-label">Email Id:</label>
                <input 
                    type = "text"
                    class = "form-control"
                    id = "email"
                    [(ngModel)] = "employee.email"
                    name="email"
                >
            </div>
            <div class="container my-3">
                <button class="btn btn-success" name="btn" id="btn" type="submit">Update</button>
                <button routerLink="/employees" class="btn btn-danger mx-2" name="btn" id="btn" >Cancel</button>
            </div>
        </form>
    </div>
    </div>
