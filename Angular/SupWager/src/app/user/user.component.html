<div class="container">
    <form class="form p-4">
        <h2 class="text-center text-light">User Login</h2>
        <div class="form-group">
          <label for="exampleInputEmail1 " class="text-light">Email Address</label>
          <input type="email" class="form-control" id="exampleInputEmail1" aria-describedby="emailHelp" placeholder="Enter email">
          <small id="emailHelp" class="form-text text-secondary text">We'll never share your email with anyone else.</small>
        </div>
        <div class="form-group">
          <label for="exampleInputPassword1 " class="text-light">Password</label>
          <input type="password" class="form-control" id="exampleInputPassword1" placeholder="Password">
        </div>
        <div class="form-check my-2">
          <input type="checkbox" class="form-check-input" id="exampleCheck1">
          <label class="form-check-label text-light " for="exampleCheck1">Accept all terms and conditions</label>
        </div>
        <button type="submit" class="btn btn-primary my-2">Login</button>
    </form>
</div>
