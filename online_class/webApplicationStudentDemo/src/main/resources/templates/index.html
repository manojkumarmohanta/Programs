<!DOCTYPE html>
<html lang="en" xmlns="https://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>All Person Detail Page</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="stylesheet" 
	href="https://cdn.jsdelivr.net/npm/bootstrap@4.0.0/dist/css/bootstrap.min.css" 
	integrity="sha384-Gn5384xqQ1aoWXA+058RXPxPg6fy4IWvTNh0E263XmFcJlSAwiGgFAW/dAiS6JXm" 
	crossorigin="anonymous"/>	
</head>
<body>
	
	<div class="container" align="center"><br>
	<a th:href="@{/addStudent}" class="btn btn-primary" >Add Student</a>
	<h1>All The Student Information As Follows</h1>
	<table style="width: 80% ; border: 1px;">
		<tr>
		
			<th>Student Name</th>
			<th>Student Email</th>
			<th>Action</th>
		</tr>
		<tr th:each="student:${students}">
			
			<td th:text="${student.name}">Name</td>
			<td th:text="${student.email}">Email</td>
			<td>
				<a th:href="@{/showFormUpdate/{id}(id=${student.id})}" 
				class="btn btn-primary">Update</a>
				<a th:href="@{/deleteStudent/{id}(id=${student.id})}" 
				class="btn btn-danger">Delete</a>
			</td>
		</tr>
	</table>
	</div><br>
	<div align="center" class="my-4"><a th:href="@{/welcome}" class="btn btn-success btn-sm" >Click Here Go to Welcome</a></div>
	
</body>

</html>
